version: '3.8'

x-airflow-common:
  &airflow-common
  build:
    context: ./docker
    dockerfile: airflow.Dockerfile
  environment:
    &airflow-common-env
    # ───────────────────────────────────────────────
    # Airflow core settings – fully hard-coded
    # ───────────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: true
    AIRFLOW__CORE__LOAD_EXAMPLES: false
    AIRFLOW__CORE__ENABLE_XCOM_PICKLING: true
    AIRFLOW__WEBSERVER__SECRET_KEY: f62540e0e9039f824adca35b71f2a132658e9fb3dc09372cd0ce4d48f1210c29
    AIRFLOW_UID: 50000
    AIRFLOW__WEBSERVER__WORKERS: 2
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: 300
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: 300
    AIRFLOW__CORE__PARALLELISM: 4
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 4
    AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 1

    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432

    # Airflow web user (for init)
    AIRFLOW_WWW_USER_USERNAME: admin
    AIRFLOW_WWW_USER_PASSWORD: admin

    # ───────────────────────────────────────────────
    # Postgres – fully hard-coded to match connection string
    # ───────────────────────────────────────────────
    POSTGRES_USER: airflow
    POSTGRES_PASSWORD: airflow
    POSTGRES_DB: airflow

    # Neo4j – fully hard-coded auth
    NEO4J_AUTH: neo4j/SecureNeo4jPass2025!

    # API keys (using the values you provided earlier)
    FMP_API_KEY: 6kqjitcYPxyr60Xy1Jfem92Q1z9LfCHM
    EODHD_API_KEY: 6957671cac2858.27368157

    # DeepSeek API — used by the Business Analyst and Financial Modelling agents
    DEEPSEEK_API_KEY: sk-9fe1b0635ca341f3bccbe222132e3461
    BUSINESS_ANALYST_LLM_PROVIDER: deepseek
    FM_LLM_PROVIDER: deepseek

    # Ollama – still used for embeddings (nomic-embed-text)
    OLLAMA_BASE_URL: http://ollama:11434
    OLLAMA_HOST: ollama
    OLLAMA_PORT: 11434

    # Embedding model — lock to tagged version to prevent silent model drift.
    # Override with EMBEDDING_MODEL env var if you pull a different version.
    LLM_MODEL_BUSINESS_ANALYST: deepseek-reasoner
    LLM_MODEL_QUANTITATIVE: llama3.2:3b
    LLM_MODEL_FINANCIAL_MODELING: deepseek-reasoner
    EMBEDDING_MODEL: nomic-embed-text:v1.5
    EMBEDDING_MODEL_VERSION: "1.0"
    EMBEDDING_DIMENSION: 768

    # Other common database / agent settings
    NEO4J_URI: bolt://neo4j:7687
    NEO4J_USER: neo4j
    NEO4J_PASSWORD: SecureNeo4jPass2025!
    NEO4J_HOST: neo4j
    NEO4J_PORT: 7687

    BUSINESS_ANALYST_MAX_CHUNKS: 50
    BUSINESS_ANALYST_CHUNK_SIZE: 1000
    BUSINESS_ANALYST_OVERLAP: 200
    # DeepSeek API — max output tokens for deepseek-reasoner (supports up to 32k)
    BUSINESS_ANALYST_MAX_TOKENS: 32000

    # BA agent tuning — all configurable without code changes
    BA_MAX_REWRITE_LOOPS: 3
    CRAG_CORRECT_THRESHOLD: "0.6"
    CRAG_AMBIGUOUS_THRESHOLD: "0.4"

    TRACKED_TICKERS: "AAPL,TSLA,NVDA,MSFT,GOOGL"

    # Ensure /opt/airflow is always on PYTHONPATH so that `agents/` and
    # `orchestration/` are importable when running modules directly with
    # `python -m agents.business_analyst.agent` (Airflow's DAG loader adds
    # this automatically, but direct python invocations do not).
    PYTHONPATH: /opt/airflow

    # Slack webhook for Airflow failure notifications (optional).
    # Set this variable to enable alerts: SLACK_WEBHOOK_URL: https://hooks.slack.com/...
    # SLACK_WEBHOOK_URL: ""

  volumes:
    - ./ingestion/dags:/opt/airflow/dags
    - ./data/logs:/opt/airflow/logs
    - ./ingestion/etl:/opt/airflow/etl
    - ./ingestion:/opt/airflow/ingestion
    - ./agents:/opt/airflow/agents
    - ./orchestration:/opt/airflow/orchestration
    - ./data:/opt/airflow/data
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
    ollama:
      condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: fyp-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: "no"

  neo4j:
    image: neo4j:5.15-community
    container_name: fyp-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/SecureNeo4jPass2025!
      NEO4J_server_http_listen__address: ":7474"
      NEO4J_server_bolt_listen__address: ":7687"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
      # Prevent the entrypoint from looping on password-reset when the DB is
      # already initialized (avoids "Neo4j is already running" crash loop on restart)
      NEO4J_EDITION: community
    volumes:
      - ./data/neo4j_data:/data
      - ./data/neo4j_logs:/logs
      - ./data/neo4j_import:/var/lib/neo4j/import
      - ./data/neo4j_plugins:/plugins
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Ollama LLM / embedding service ─────────────────────────────────────────
  # Runs as a proper Docker service so all other containers reach it via
  # http://ollama:11434 — no more host.docker.internal hacks on Linux/Mac/Windows.
  #
  # GPU support (NVIDIA): uncomment the `deploy` block below and ensure the
  # NVIDIA Container Toolkit is installed (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/).
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: "no"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      ollama serve &
      SERVE_PID=$$!;
      echo 'Waiting for Ollama server...';
      i=0; while [ $$i -lt 300 ]; do
        ollama list > /dev/null 2>&1 && break;
        sleep 1; i=$$(($$i+1));
      done;
      echo 'Pulling models if missing...';
      ollama pull nomic-embed-text:v1.5 || echo 'nomic skipped/failed';
      echo 'Models pulled, ready!';
      wait $$SERVE_PID
      "

  airflow-webserver:
    <<: *airflow-common
    container_name: fyp-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: fyp-airflow-scheduler
    command: scheduler
    restart: "no"

  airflow-init:
    <<: *airflow-common
    container_name: fyp-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/etl
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        # Pull required Ollama models on first startup
        echo "[init] Pulling Ollama models via http://ollama:11434 ..."
        curl -sf http://ollama:11434/api/tags && \
          curl -X POST http://ollama:11434/api/pull -d '{"name":"nomic-embed-text:v1.5"}' && \
          curl -X POST http://ollama:11434/api/pull -d '{"name":"llama3.2:3b"}' || \
          echo "[init] WARNING: Could not pull Ollama models — pull manually after startup."
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  # Named volume for Ollama model storage.
  # Use `docker volume inspect fyp_ollama-data` to locate the data on the host.
  ollama-data:

networks:
  default:
    name: agentic-analyst-network
