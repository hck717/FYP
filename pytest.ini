[pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: Integration tests requiring live services (PostgreSQL, Neo4j, Ollama)
    prompt: Prompt/LLM tests
    unit: Unit tests with no external dependencies

addopts =
    -v
    --strict-markers
    --tb=short

timeout = 120

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning